<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="devsink logo">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="accent" x1="64" y1="48" x2="180" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="2" y="2" width="252" height="252" rx="58" fill="url(#badge)"/>
  <rect x="2.75" y="2.75" width="250.5" height="250.5" rx="57.25" fill="none" stroke="#475569" stroke-opacity="0.45" stroke-width="1.5"/>

  <g stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- console / network streams pouring in -->
    <path d="M90 52 H166" stroke-width="11"/>
    <path d="M98 70 H158" stroke-width="11"/>
    <path d="M106 88 H150" stroke-width="11"/>

    <!-- funnel (the sink) -->
    <path d="M72 100 L119 156 L119 178 L137 178 L137 156 L184 100" stroke-width="13"/>

    <!-- collected file below -->
    <path d="M104 196 H152" stroke-width="11"/>
    <path d="M112 213 H144" stroke-width="11"/>
  </g>

  <!-- droplet between spout and file -->
  <circle cx="128" cy="189" r="4" fill="url(#accent)"/>
</svg>
